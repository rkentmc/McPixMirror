name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: macos-latest  # ARM64 — matches the target platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check mcpixmirror/ tests/

      - name: Format check (ruff)
        run: ruff format --check mcpixmirror/ tests/

      - name: Type check (mypy)
        run: mypy mcpixmirror/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short
